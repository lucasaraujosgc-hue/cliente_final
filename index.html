<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://www.virgulacontabil.com.br/wp-content/uploads/2026/04/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Primary Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    
    <!-- iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Vírgula" />
    <link rel="apple-touch-icon" href="https://www.virgulacontabil.com.br/wp-content/uploads/2026/04/favicon.png" />

    <title>Portal do Cliente - Vírgula Contábil</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Serviceworker registrado com sucesso:', reg.scope))
            .catch(err => console.log('Falha ao registrar ServiceWorker:', err));
        });
      }
    </script>
  </body>
</html>
